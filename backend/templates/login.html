{% load static %}
{% load i18n %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% trans "Kirish | Online Kutibxona" %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
            overflow: hidden;
            padding: 20px;
        }

        .auth-bg {
            position: absolute;
            width: 120%;
            height: 120%;
            top: -10%;
            left: -10%;
            background: url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?q=80&w=2070&auto=format&fit=crop') center/cover no-repeat;
            filter: brightness(0.4) saturate(1.2);
            animation: ken-burns 60s infinite alternate linear;
            z-index: 1;
        }

        @keyframes ken-burns {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.2) translate(2%, -2%); }
        }

        .auth-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, #000 100%);
            z-index: 2;
        }

        .auth-card {
            width: 100%;
            max-width: 450px;
            padding: 50px;
            position: relative;
            z-index: 10;
            border-radius: 24px;
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-banner {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-bg"></div>
        <div class="auth-overlay"></div>
        
        <div class="auth-card">
            <div style="text-align: center; margin-bottom: 40px;">
                <h1 class="gradient-text" style="font-size: 2.5rem; margin-bottom: 10px;">{% trans "Xush kelibsiz" %}</h1>
                <p style="color: var(--text-muted);">{% trans "Online kutibxonaga kirish" %}</p>
            </div>

            {% if error %}
            <div class="error-banner">
                <i class="fas fa-exclamation-circle"></i> {{ error }}
            </div>
            {% endif %}

            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">{% trans "Foydalanuvchi nomi" %}</label>
                    <input type="text" name="username" id="username" class="form-control" placeholder="admin" required>
                </div>

                <div class="form-group">
                    <label for="password">{% trans "Parol" %}</label>
                    <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">
                    {% trans "Kirish" %} <i class="fas fa-arrow-right" style="margin-left: 8px;"></i>
                </button>
            </form>
        </div>
    </div>
</body>
</html>
